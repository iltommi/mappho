<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SharPho</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#16213e" />
</head>
<body>
  <header id="topbar">
    <span id="app-title">SharPho</span>
    <span id="status"></span>
    <button id="auth-btn" style="display:none">Disconnect</button>
  </header>

  <div id="login-overlay">
    <form id="login-form">
      <h2>SharPho</h2>

      <div id="tab-bar">
        <button type="button" class="tab active" data-tab="password">Email / password</button>
        <button type="button" class="tab" data-tab="token">Paste token</button>
      </div>

      <div id="pane-password">
        <input id="email" type="email" placeholder="Email" autocomplete="email" />
        <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
        <input id="totp" type="text" placeholder="Verification code" autocomplete="one-time-code"
               inputmode="numeric" pattern="[0-9]*" style="display:none" />
      </div>

      <div id="pane-token" style="display:none">
        <p class="hint">
          1. Log in to <a href="https://my.pcloud.com" target="_blank">my.pcloud.com</a><br>
          2. Open DevTools → Network tab<br>
          3. Click any request to <code>eapi.pcloud.com</code><br>
          4. Copy the <code>auth_token</code> value from the URL<br>
          5. Paste it below
        </p>
        <input id="token-input" type="text" placeholder="auth_token value" autocomplete="off" />
      </div>

      <button type="submit" id="login-btn">Sign in</button>
      <span id="login-error"></span>
    </form>
  </div>
  <div id="map"></div>
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <div id="log-panel">
    <div id="log-header">
      <span>Debug log</span>
      <button id="log-toggle">Show log</button>
    </div>
    <div id="log-list"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>

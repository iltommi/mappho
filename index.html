<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SharPho</title>
<meta name="theme-color" content="#16213e" />
</head>
<body>
  <header id="topbar">
    <span id="topbar-title"></span>
    <button id="heatmap-btn" title="Toggle heatmap" style="display:none">🔥</button>
    <div id="menu-wrap" style="display:none">
      <button id="menu-btn" title="More options">⋮</button>
      <div id="overflow-menu">
        <div id="folder-row">
          <button id="folder-btn">All photos</button>
          <button id="scan-btn">Scan</button>
        </div>
        <button id="export-btn" class="menu-item">📤 Backup to pCloud</button>
        <button id="import-btn" class="menu-item">📥 Restore from pCloud</button>
        <button id="erase-cache-btn" class="menu-item">🗑 Erase cache</button>
        <button id="clear-cache-btn" class="menu-item">↺ Rescan</button>
        <label id="local-btn" class="menu-item">📂 Local test
          <input id="local-input" type="file" accept="image/jpeg,image/heic,image/heif" multiple style="display:none" />
        </label>
        <button id="noloc-menu-btn" class="menu-item">📍 No location</button>
        <button id="nodatetime-menu-btn" class="menu-item">🕳 No date &amp; no location</button>
        <button id="filter-menu-btn" class="menu-item">📅 Date filter</button>
        <button id="log-menu-btn" class="menu-item">📋 Debug log</button>
        <button id="check-update-btn" class="menu-item">🔄 Check for updates</button>
<button id="auth-btn" class="menu-item">Disconnect</button>
      </div>
    </div>
  </header>

  <div id="login-overlay">
    <form id="login-form">
      <h2>SharPho</h2>
      <p>Sign in with your pCloud account</p>
      <div id="dc-pick">
        <label class="dc-label">
          <input type="radio" name="dc" value="eu" /> EU
        </label>
        <label class="dc-label">
          <input type="radio" name="dc" value="us" /> US
        </label>
      </div>
      <input id="email" type="email" placeholder="Email" autocomplete="email" required />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" required />
      <input id="totp" type="text" placeholder="Authenticator code" autocomplete="one-time-code"
             inputmode="numeric" pattern="[0-9]*" style="display:none" />
      <button type="submit" id="login-btn">Sign in</button>
      <span id="login-error"></span>
      <details id="token-details">
        <summary>Paste auth token instead</summary>
        <p class="hint">
          Log in to <a href="https://my.pcloud.com" target="_blank">my.pcloud.com</a>, open DevTools → Network,
          click any request to <code>eapi.pcloud.com</code> and copy the <code>auth_token</code> value.
        </p>
        <input id="token-input" type="text" placeholder="Paste auth_token here" autocomplete="off" />
        <button type="button" id="use-token-btn">Use this token</button>
      </details>
    </form>
  </div>
  <div id="filter-panel">
    <p class="filter-no-dates" style="display:none">No photo dates in cache — rescan to pick up dates.</p>
    <div class="filter-row">
      <span class="filter-label">From</span>
      <input type="range" id="filter-from" min="0" max="1000" value="0" />
      <span id="filter-from-val" class="filter-val"></span>
    </div>
    <div class="filter-row">
      <span class="filter-label">To</span>
      <input type="range" id="filter-to" min="0" max="1000" value="1000" />
      <span id="filter-to-val" class="filter-val"></span>
    </div>
  </div>
  <div id="map"></div>
  <div id="slideshow">
    <button id="ss-close">✕</button>
    <div id="ss-img-wrap">
      <button id="ss-prev">&#8249;</button>
      <div id="ss-track">
        <div class="ss-pane"><img id="ss-img-prev" alt="" /></div>
        <div class="ss-pane">
          <span id="ss-loading">Loading…</span>
          <img id="ss-img" alt="" />
        </div>
        <div class="ss-pane"><img id="ss-img-next" alt="" /></div>
      </div>
      <button id="ss-next">&#8250;</button>
    </div>
    <div id="ss-footer">
      <div id="ss-counter"></div>
      <p id="ss-caption"></p>
      <div id="ss-footer-btns">
        <button id="ss-geotag-btn" style="display:none">📍 Set location</button>
        <button id="ss-exif-btn">ℹ EXIF</button>
      </div>
    </div>
  </div>
  <div id="lightbox">
    <button id="lightbox-close">✕</button>
    <button id="lightbox-exif-btn">ℹ EXIF</button>
    <span id="lightbox-loading">Loading…</span>
    <img id="lightbox-img" alt="" />
  </div>
  <div id="video-player">
    <button id="vp-close">✕</button>
    <span id="vp-loading">Loading…</span>
    <video id="vp-video" controls playsinline></video>
  </div>
  <div id="scan-status"></div>
  <button id="stop-scan-btn" style="display:none" title="Stop scan">✕ Stop</button>
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <div id="folder-picker" style="display:none">
    <div id="fp-header">
      <button id="fp-back">←</button>
      <span id="fp-breadcrumb"></span>
      <button id="fp-close">✕</button>
    </div>
    <div id="fp-list"></div>
  </div>

  <div id="exif-panel">
    <div id="exif-header">
      <span id="exif-title">EXIF</span>
      <button id="exif-close">✕</button>
    </div>
    <div id="exif-list"></div>
  </div>

  <div id="log-panel">
    <div id="log-header">
      <span>Debug log</span>
      <button id="log-save">Save</button>
      <button id="log-clear">Clear</button>
      <button id="log-close">✕</button>
    </div>
    <div id="log-list"></div>
  </div>
  <div id="pin-drop-bar" style="display:none">
    <span id="pin-drop-hint"></span>
    <div id="pin-drop-actions">
      <button id="pin-drop-save" disabled>💾 Save</button>
      <button id="pin-drop-cancel">✕ Cancel</button>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>

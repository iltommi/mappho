<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SharPho</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#16213e" />
</head>
<body>
  <header id="topbar">
    <select id="folder-select" style="display:none"></select>
    <button id="scan-btn" style="display:none">Scan</button>
    <div id="menu-wrap" style="display:none">
      <button id="menu-btn" title="More options">⋮</button>
      <div id="overflow-menu">
        <button id="erase-cache-btn" class="menu-item">🗑 Erase cache</button>
        <button id="clear-cache-btn" class="menu-item">↺ Rescan</button>
        <label id="local-btn" class="menu-item">📂 Local test
          <input id="local-input" type="file" accept="image/jpeg" multiple style="display:none" />
        </label>
        <button id="filter-menu-btn" class="menu-item">📅 Date filter</button>
        <button id="log-menu-btn" class="menu-item">📋 Debug log</button>
        <button id="auth-btn" class="menu-item">Disconnect</button>
      </div>
    </div>
  </header>

  <div id="login-overlay">
    <form id="login-form">
      <h2>SharPho</h2>
      <p>Sign in with your pCloud account</p>
      <input id="email" type="email" placeholder="Email" autocomplete="email" required />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" required />
      <input id="totp" type="text" placeholder="Authenticator code" autocomplete="one-time-code"
             inputmode="numeric" pattern="[0-9]*" style="display:none" />
      <button type="submit" id="login-btn">Sign in</button>
      <span id="login-error"></span>
      <details id="token-details">
        <summary>Paste auth token instead</summary>
        <p class="hint">
          Log in to <a href="https://my.pcloud.com" target="_blank">my.pcloud.com</a>, open DevTools → Network,
          click any request to <code>eapi.pcloud.com</code> and copy the <code>auth_token</code> value.
        </p>
        <input id="token-input" type="text" placeholder="Paste auth_token here" autocomplete="off" />
        <button type="button" id="use-token-btn">Use this token</button>
      </details>
    </form>
  </div>
  <div id="filter-panel">
    <p class="filter-no-dates" style="display:none">No photo dates in cache — rescan to pick up dates.</p>
    <div class="filter-row">
      <span class="filter-label">From</span>
      <input type="range" id="filter-from" min="0" max="1000" value="0" />
      <span id="filter-from-val" class="filter-val"></span>
    </div>
    <div class="filter-row">
      <span class="filter-label">To</span>
      <input type="range" id="filter-to" min="0" max="1000" value="1000" />
      <span id="filter-to-val" class="filter-val"></span>
    </div>
  </div>
  <div id="map"></div>
  <div id="lightbox">
    <button id="lightbox-close">✕</button>
    <span id="lightbox-loading">Loading…</span>
    <img id="lightbox-img" alt="" />
  </div>
  <div id="scan-status"></div>
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <div id="log-panel">
    <div id="log-header">
      <span>Debug log</span>
      <button id="log-clear">Clear</button>
      <button id="log-close">✕</button>
    </div>
    <div id="log-list"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>

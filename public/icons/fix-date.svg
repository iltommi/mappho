<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Calendar body -->
  <rect x="2" y="5" width="16" height="15" rx="1.5" fill="#5a8fd4"/>
  <!-- Header band -->
  <rect x="2" y="5" width="16" height="4.5" rx="1.5" fill="#3a6fb4"/>
  <rect x="2" y="7.5" width="16" height="2" fill="#3a6fb4"/>
  <!-- Binding rings -->
  <rect x="5.5" y="3" width="2" height="4.5" rx="1" fill="#888"/>
  <rect x="12.5" y="3" width="2" height="4.5" rx="1" fill="#888"/>
  <!-- Date grid: row 1 -->
  <rect x="4" y="12" width="2.2" height="2" rx="0.4" fill="white" opacity="0.85"/>
  <rect x="7.9" y="12" width="2.2" height="2" rx="0.4" fill="white" opacity="0.85"/>
  <rect x="11.8" y="12" width="2.2" height="2" rx="0.4" fill="white" opacity="0.85"/>
  <!-- Date grid: row 2 -->
  <rect x="4" y="15.5" width="2.2" height="2" rx="0.4" fill="white" opacity="0.5"/>
  <rect x="7.9" y="15.5" width="2.2" height="2" rx="0.4" fill="white" opacity="0.5"/>
  <!-- Red X badge background -->
  <circle cx="19.5" cy="4.5" r="4.5" fill="#e74c3c"/>
  <!-- X lines -->
  <line x1="17" y1="2" x2="22" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="22" y1="2" x2="17" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>

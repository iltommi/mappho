name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/sharpho.keystore

      - name: Build release APK
        env:
          KEYSTORE_FILE: sharpho.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease
        working-directory: android

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk SharPho.apk
          gh release delete latest --yes --repo $GITHUB_REPOSITORY 2>/dev/null || true
          gh release create latest \
            --repo $GITHUB_REPOSITORY \
            --title "SharPho (latest build)" \
            --notes "APK built from the latest commit on main. Install by downloading and opening on your Android device (enable *Install from unknown sources* when prompted)." \
            --prerelease \
            SharPho.apk

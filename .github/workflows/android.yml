name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - run: npx cap sync android

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --repo $GITHUB_REPOSITORY 2>/dev/null || true
          gh release create latest \
            --repo $GITHUB_REPOSITORY \
            --title "SharPho (latest debug build)" \
            --notes "Debug APK built from the latest commit on main. Install by downloading and opening on your Android device (enable *Install from unknown sources* when prompted)." \
            --prerelease \
            android/app/build/outputs/apk/debug/app-debug.apk#SharPho.apk
